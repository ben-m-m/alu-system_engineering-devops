<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>404 - Page Not Found</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #111827, #1f2937);
                color: #f9fafb;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                text-align: center;
            }

            .container {
                background: rgba(255, 255, 255, 0.08);
                padding: 2rem 3rem;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                max-width: 600px;
            }

            h1 {
                font-size: 3rem;
                margin-bottom: 0.5rem;
                color: #fbbf24;
            }

            .tagline {
                font-size: 1.3rem;
                font-weight: bold;
                margin-bottom: 1rem;
                letter-spacing: 0.1em;
            }

            img {
                width: 280px;
                max-width: 100%;
                border-radius: 12px;
                margin: 1rem 0;
            }

            a {
                display: inline-block;
                margin-top: 1rem;
                color: #fbbf24;
                text-decoration: none;
                font-weight: bold;
            }

            a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>404 - Page Not Found</h1>
            <p class="tagline">YOU, SHALL NOT PASS!!</p>
            <img src="gandalf.jpg" alt="Gandalf saying you shall not pass" />
            <p>Sorry, the page you are looking for does not exist.</p>
            <p><a href="/">Go back to the homepage</a></p>
        </div>
    </body>
</html>
